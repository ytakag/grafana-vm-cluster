- name: Install packages
  ansible.builtin.dnf:
    name:
      - keepalived
    state: present

- name: Copy templates files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: "root"
    group: "root"
    mode: "{{ item.mode }}"
  loop:
    - src: "keepalived.conf.j2"
      dest: "/etc/keepalived/keepalived.conf"
      mode: "0644"
    - src: "check_vmauth.sh.j2"
      dest: "/usr/local/bin/check_vmauth.sh"
      mode: "0755"
  notify: Restart keepalived

- name: Enable and start keepalived services
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - keepalived
