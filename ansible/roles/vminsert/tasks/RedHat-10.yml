- name: Create directory
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/{{ working_dir }}/{{ item.path }}/vminsert"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  with_filetree: templates
  when: item.state == "directory"

- name: Copy templates files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ ansible_user_dir }}/{{ working_dir }}/vminsert/{{ item.path |
      regex_replace('\\.j2$', '') }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  with_filetree: templates
  when: item.state == "file"

- name: Start podman compose
  become: false
  ansible.builtin.command:
    cmd: podman compose up -d
    chdir: "{{ ansible_user_dir }}/{{ working_dir }}/vminsert"
