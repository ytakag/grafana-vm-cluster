- name: Create top directory
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/{{ working_dir }}/{{ deploy_dir }}/config"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Create directory
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/{{ working_dir }}/{{ deploy_dir }}/{{ item.path }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  with_filetree: "{{ role_path }}/templates"
  when: item.state == "directory"

- name: Copy files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "/home/{{ ansible_user }}/{{ working_dir }}/{{ deploy_dir }}/{{ item.path }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  with_filetree: "{{ role_path }}/files"
  when: item.state == "file"

- name: Copy templates files
  become: false
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "/home/{{ ansible_user }}/{{ working_dir }}/{{ deploy_dir }}/{{ item.path
      | regex_replace('\\.j2$', '') }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  with_filetree: "{{ role_path }}/templates"
  when: item.state == "file"

- name: Start podman compose
  become: false
  ansible.builtin.command:
    cmd: podman compose up -d
    chdir: "/home/{{ ansible_user }}/{{ working_dir }}/{{ deploy_dir }}"
