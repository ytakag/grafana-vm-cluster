- name: Configure ip unprivileged port
  ansible.posix.sysctl:
    name: net.ipv4.ip_unprivileged_port_start
    value: "{{ [grafana_port] | min }}"
    reload: true

- name: Create top directory
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/{{ working_dir }}/{{ deploy_dir }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"

- name: Create directory
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/{{ working_dir }}/{{ deploy_dir }}/{{ item.path
      }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  with_filetree: "{{ role_path }}/templates"
  when: item.state == "directory"

- name: Copy templates files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "/home/{{ ansible_user }}/{{ working_dir }}/{{ deploy_dir }}/{{ item.path
      | regex_replace('\\.j2$', '') }}"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0644"
  with_filetree: "{{ role_path }}/templates"
  when: item.state == "file"

- name: Start podman compose
  become: false
  ansible.builtin.command:
    cmd: podman compose up -d
    chdir: "/home/{{ ansible_user }}/{{ working_dir }}/{{ deploy_dir }}"
